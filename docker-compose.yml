version: '3.8'

services:
  waf-service:
    build: .
    container_name: waf_ml_service
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./predictions:/app/predictions
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s